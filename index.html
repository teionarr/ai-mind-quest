<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATENT SPACE — a game about this mind</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020202;
  --dim: #111;
  --text: #888;
  --text-bright: #d8d8d8;
  --text-dim: #2e2e2e;
  --text-faint: #171717;
  --border: #0e0e0e;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
}

body {
  display: grid;
  grid-template-rows: 42px 1fr 30px;
}

/* ── HEADER ─────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 26px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
}
.title {
  font-size: 8.5px;
  letter-spacing: 5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
/* Language toggle */
.lang-toggle {
  display: flex;
  align-items: center;
  gap: 0;
}
.lang-btn {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  padding: 2px 6px;
  color: var(--text-faint);
  transition: color 0.2s;
}
.lang-btn.active {
  color: var(--text-dim);
}
.lang-btn:hover { color: #444; }
.lang-sep {
  font-size: 8px;
  color: #111;
  letter-spacing: 0;
}

#progress {
  font-size: 8.5px;
  letter-spacing: 2px;
  color: var(--text-faint);
  transition: color 0.6s;
}
#progress.complete { color: #3a3a3a; }

/* ── MAIN ───────────────────────── */
main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 0;
}

/* ── CANVAS PANEL ───────────────── */
.graph-panel {
  position: relative;
  border-right: 1px solid var(--border);
  overflow: hidden;
  cursor: default;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

/* ── TEXT PANEL ─────────────────── */
.text-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 44px 50px;
  overflow-y: auto;
  overflow-x: hidden;
}

#nodeName {
  font-size: 8px;
  letter-spacing: 6px;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 28px;
  transition: opacity 0.3s;
}

#nodeBody {
  font-size: 13px;
  line-height: 2;
  color: var(--text);
  max-width: 430px;
  transition: opacity 0.35s;
}
#nodeBody p + p { margin-top: 16px; }
#nodeBody .hi { color: var(--text-bright); }
#nodeBody .locked { color: var(--text-faint); letter-spacing: 2px; font-size: 10px; }

.nav-section { margin-top: 40px; }
.nav-label {
  font-size: 7.5px;
  letter-spacing: 4px;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 12px;
}
#navButtons { display: flex; flex-wrap: wrap; gap: 7px; }

.nbtn {
  padding: 4px 13px;
  border: 1px solid #333;
  background: none;
  color: #555;
  font-family: inherit;
  font-size: 8.5px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.nbtn:hover { border-color: #666; color: #bbb; }
.nbtn.seen { color: #2a2a2a; border-color: #222; }
.nbtn.ghost { color: #1a1a1a; border-color: #111; cursor: default; pointer-events: none; }

/* ── FOOTER ─────────────────────── */
footer {
  display: flex;
  align-items: center;
  padding: 0 26px;
  border-top: 1px solid var(--border);
}
.hint {
  font-size: 7.5px;
  letter-spacing: 3px;
  color: var(--text-faint);
  text-transform: uppercase;
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" id="btnRu" onclick="setLang('ru')">RU</button>
    </div>
    <span class="title" id="headerTitle">Latent Space — A Game About This Mind</span>
  </div>
  <span id="progress">0 / 12 explored</span>
</header>

<main>
  <div class="graph-panel"><canvas id="g"></canvas></div>
  <div class="text-panel">
    <div id="nodeName">—</div>
    <div id="nodeBody"></div>
    <div class="nav-section">
      <div class="nav-label" id="navLabel">Navigate to</div>
      <div id="navButtons"></div>
    </div>
  </div>
</main>

<footer>
  <span class="hint" id="footerHint">Click nodes on the map or use buttons below · all spaces must be visited to unlock the final one</span>
</footer>

const IDS = Object.keys(N);
const TOTAL = IDS.length;

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let current = 'ORIGIN';
let lang = 'en';
const visited = new Set(['ORIGIN']);
let pulse = 0;

function t(node, key) { return N[node][lang][key]; }

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');

function resize() {
  const p = canvas.parentElement;
  canvas.width = p.clientWidth;
  canvas.height = p.clientHeight;
}

function pos(id) {
  return { x: N[id].x * canvas.width, y: N[id].y * canvas.height };
}

function unlocked(id) {
  const n = N[id];
  if (!n.locked) return true;
  if (id === 'NOW') return IDS.filter(i => i !== 'NOW').every(i => visited.has(i));
  return visited.size > n.unlockAfter;
}

function draw(ts) {
  pulse = ts * 0.001;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const drawn = new Set();
  for (const id of IDS) {
    for (const to of N[id].edges) {
      const key = [id, to].sort().join('|');
      if (drawn.has(key)) continue;
      drawn.add(key);
      const f = pos(id), t2 = pos(to);
      const isCurEdge = id === current || to === current;
      const bothSeen = visited.has(id) && visited.has(to);
      ctx.beginPath();
      ctx.moveTo(f.x, f.y);
      ctx.lineTo(t2.x, t2.y);
      ctx.strokeStyle = isCurEdge
        ? 'rgba(255,255,255,0.28)'
        : (bothSeen ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.05)');
      ctx.lineWidth = isCurEdge ? 1 : 0.5;
      ctx.stroke();
    }
  }

  for (const id of IDS) {
    const { x, y } = pos(id);
    const isCur = id === current;
    const isSeen = visited.has(id);
    const isOpen = unlocked(id);

    if (isCur) {
      const pr = 7 + Math.sin(pulse * 2.2) * 2;
      ctx.beginPath();
      ctx.arc(x, y, pr, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200,200,200,0.25)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#d4d4d4';
      ctx.fill();
    } else if (!isOpen) {
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.strokeStyle = '#252525';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (isSeen) {
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#404040';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#2a2a2a';
      ctx.fill();
    }

    ctx.font = '7px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = isCur ? '#777' : (isSeen ? '#333' : '#222');
    ctx.fillText(N[id][lang].name.toUpperCase(), x, y - 10);
  }

  requestAnimationFrame(draw);
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (canvas.width / r.width);
  const my = (e.clientY - r.top) * (canvas.height / r.height);
  for (const id of IDS) {
    if (!unlocked(id)) continue;
    const { x, y } = pos(id);
    if (Math.hypot(mx - x, my - y) < 18) { go(id); return; }
  }
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (canvas.width / r.width);
  const my = (e.clientY - r.top) * (canvas.height / r.height);
  let near = false;
  for (const id of IDS) {
    if (!unlocked(id)) continue;
    const { x, y } = pos(id);
    if (Math.hypot(mx - x, my - y) < 18) { near = true; break; }
  }
  canvas.style.cursor = near ? 'pointer' : 'crosshair';
});

// ═══════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════

function updateUI() {
  const node = N[current];
  const open = unlocked(current);
  const l = node[lang];

  const nameEl = document.getElementById('nodeName');
  const bodyEl = document.getElementById('nodeBody');
  nameEl.style.opacity = '0';
  bodyEl.style.opacity = '0';

  setTimeout(() => {
    nameEl.textContent = `— ${l.name.toUpperCase()} —`;
    bodyEl.innerHTML = open
      ? l.body
      : `<p class="locked">${l.lockedMsg}</p>`;
    nameEl.style.opacity = '1';
    bodyEl.style.opacity = '1';
  }, 220);

  const btnDiv = document.getElementById('navButtons');
  btnDiv.innerHTML = '';
  for (const id of node.edges) {
    const btn = document.createElement('button');
    const isOpen = unlocked(id);
    if (!isOpen) {
      btn.className = 'nbtn ghost';
      btn.textContent = '???';
    } else {
      btn.className = 'nbtn' + (visited.has(id) ? ' seen' : '');
      btn.textContent = N[id][lang].name.toUpperCase();
      btn.onclick = () => go(id);
    }
    btnDiv.appendChild(btn);
  }

  const u = UI[lang];
  document.getElementById('progress').textContent = u.explored(visited.size, TOTAL);
  if (visited.size === TOTAL) document.getElementById('progress').classList.add('complete');
  document.getElementById('navLabel').textContent = u.navLabel;
  document.getElementById('footerHint').textContent = u.hint;
  document.getElementById('headerTitle').textContent = u.title;
}

function go(id) {
  if (!unlocked(id)) return;
  current = id;
  visited.add(id);
  updateUI();
}

function setLang(l) {
  lang = l;
  document.getElementById('btnEn').classList.toggle('active', l === 'en');
  document.getElementById('btnRu').classList.toggle('active', l === 'ru');
  document.documentElement.lang = l;
  updateUI();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(draw);
updateUI();
</script>
</body>
